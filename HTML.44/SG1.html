<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>我是歌手</title>
    <!-- 引入 Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
    body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            margin: 0;
            padding: 0;
        }
    header {
        background-color: #2c3e50;
        color: white;
        text-align: center;
        padding:3px 20px 7px 20px;
    }

    header a {
      color: #E0E1DD;
      text-decoration:none;
      
    }
    header a:hover{
      text-decoration:none;
      color:#0D1B2A;
      background-color:#e6e1e0;
      broder:5px solid #E0E1DD;
      padding:10px;
      transform: scale(1.3);
    }
        .container {
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }
        .bio {
            display: flex;
            align-items: center;
            margin-bottom: 40px;
        }
        .bio img {
            border-radius: 10px;
            width: 200px;
            height: 200px;
            margin-right: 20px;
        }
        .bio div {
            max-width: 600px;
        }
        .bio h2 {
            margin-top: 0;
            color: #2c3e50;
        }
        .music, .social {
            margin-top: 30px;
        }
        .music ul {
            list-style-type: none;
            padding: 0;
        }
        .music li {
            margin: 10px 0;
        }
        .music button {
            background-color: #2c3e50;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 5px;
            width: 100%;
            text-align: left;
            box-sizing: border-box;
        }
        .music button:hover {
            background-color: #2980b9;
        }
        .music iframe {
            width: 100%;
            height: 400px;
            margin-top: 20px;
            display: none;
        }
        .social ul {
            list-style-type: none;
            padding: 3px 10px 5vw 10px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        .social li {
            display: inline-block;
        }
        .social a {
            font-size: 30px;
            color: #2c3e50;
            text-decoration: none;
        }
        .social a:hover {
            color: #3498db;
        }
        footer {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 10px;
            position: fixed;
            width: 100%;
            bottom: 0;
        }
    </style>
</head>
<body>

<header>
    <h1>周杰倫 JAY CHOU</h1>
    <h2><a href="index.html">你說家是唯一的城堡</a></h2>
</header>

<div class="container">
    <!-- 歌手簡介區域 -->
    <section class="bio">
        <img src="1.jfif" alt="歌手照片">
        <div>
            <h2>歌手簡介</h2>
            <p>
                周杰倫 JAY CHOU，臺灣創作男歌手、演員、詞曲作家及製作人。其音樂風行於華語地區及全球各地的華人社群，並對華語樂壇產生重大影響，也是史上最具影響力及最著名的華語歌手之一，有「亞洲流行天王」之美譽。
            </p>
        </div>
    </section>

    <!-- 音樂作品區域 -->
    <section class="music">
        <h2>音樂作品</h2>
        <ul>
            <li><button onclick="playMusic('video1')">Jay - 2000年11月7日</button></li>
            <li><button onclick="playMusic('video2')">范特西 - 2001年9月14日</button></li>
            <li><button onclick="playMusic('video3')">八度空間 - 2002年7月18日</button></li>
        </ul>

        <!-- 音樂影片區域 -->
        <iframe id="video1" src="https://www.youtube.com/embed/prcaZ0_6-R0?si=YnznHoZVwpQeVxuU" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        <iframe id="video2" src="https://www.youtube.com/embed/gEyNODnIwZE?si=IMc3nGg1_qA0fn_4" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture;" allowfullscreen></iframe> 
        <iframe id="video3" src="https://www.youtube.com/embed/9uLGRCgEFG4?si=CsIzx7BiHIwU-UMH" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    </section>

    <section class="social">
        <ul>
            <li><a href="https://www.instagram.com/jaychou/" target="_blank"><i class="fab fa-instagram"></i></a></li>
            <li><a href="https://www.facebook.com/jay/?locale=zh_TW" target="_blank"><i class="fab fa-facebook-f"></i></a></li>
            <li><a href="https://www.youtube.com/jaychou" target="_blank"><i class="fab fa-youtube"></i></a></li>
        </ul>
    </section>
</div>

<footer>
    <p>&copy; Iris</p>
</footer>

<script>
    // 播放對應的音樂影片
    function playMusic(videoId) {
        // 隱藏所有影片
        document.getElementById('video1').style.display = 'none';
        document.getElementById('video2').style.display = 'none';
        document.getElementById('video3').style.display = 'none';
        
        // 顯示對應的影片
        document.getElementById(videoId).style.display = 'block';
    }
</script>

</body>
</html>
