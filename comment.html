    /* 身體 */
  body {
    font-family: Arial, sans-serif;

    color: #ffffff;

  }
  header {
    background-color: #2c3e50;

  header li{
    display:inline;
    margin-right:4vw;
  }
  header a {
    color: #E0E1DD;
    text-decoration:none;
    
  }
  header a:hover{
    text-decoration:none;
    color:#0D1B2A;
    background-color:#e6e1e0;
    border:5px solid #E0E1DD;
    padding:10px;
    transform: scale(1.3);

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    h1 {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }

    .card {
      background-color: #2d37489a;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .card:hover {
      background-color: #4a5568;
    }

    .card h2 {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .card p {
      font-size: 14px;
      color: #a0aec0;
    }

    textarea {
      width: 100%;
      padding: 10px;
      background-color: #2d3748;
      border: none;
      border-radius: 8px;
      color: white;
      resize: none;
      margin-bottom: 10px;
    }

    .message {
      background-color: #2d3748;
      padding: 10px;
      border-radius: 8px;
      margin: 10px;
    }

    /* 頁尾 */
    footer {
      font-family: Times New Roman, sans-serif;
      text-align: center;
      padding: 10px 0;
      background-color: #0D1B2A;
      color: white;
      position: relative;
    }

    /* 回到最初的起點 */
    .back-to-top {
      display: inline-block;
      margin-top: 10px;
      color: #ffcc00;
      text-decoration: none;
      font-size: 14px;
    }

    /* 彈出視窗 */
    .popup {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background-color: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 20px;
      border-radius: 8px;
      font-size: 16px;
      text-align: center;
    }

    .popup.active {
      display: block;
    }

    .popup .close-btn {
      background-color: #f44336;
      border: none;
      padding: 5px 10px;
      color: white;
      font-size: 14px;
      border-radius: 4px;
      cursor: pointer;
      text-align: center;
    }
    
      textarea {
          width: 80%;
          height: 100px;
          margin: 20px auto;
          display: block;
          padding: 10px;
          border: 1px solid #ccc;
          border-radius: 5px;
        }
    
    /* 按鈕 */
        button {
          padding: 10px 20px;
          border: none;
          border-radius: 5px;
          background-color: #ffcc00;
          color: NAVY;
          font-size: 16px;
          cursor: pointer;
        }

        button:hover {
          font-family: Arial, sans-serif;
          color: navy;
          background-color: #ffa60042;
        } 
    
    /*區塊*/
        section{
          padding: 30px 20px;
        }
        
    </style>

  <div class="container">

      <h1>音樂祭活動資訊</h1>
    </center>
      <div class="grid">
      <!-- 活動卡片 -->

      <div class="card" onclick="window.open('https://www.housefeel.com.tw/article/%E9%9F%B3%E6%A8%82%E7%A5%AD-%E5%8F%B0%E7%81%A3%E7%A5%AD-%E5%A4%A7%E6%B8%AF%E9%96%8B%E5%94%B1-%E7%8D%A8%E7%AB%8B%E6%A8%82%E5%9C%98/')">

  <!-- 留言牆 -->
  <center>
  <div class="container">
    <h1>留言牆</h1>
    <form id="messageForm">
      <textarea id="messageInput" rows="3" placeholder="大聲點我聽不見"></textarea>
      <button type="submit">提交</button>
    </form>
    <div id="messages">
      <!-- 留言將動態載入 -->
    </div>
  </div>
  </center>
  <script>
    // 留言牆功能
    const messageForm = document.getElementById("messageForm");
    const messagesDiv = document.getElementById("messages");

    messageForm.addEventListener("submit", function(event) {
      event.preventDefault();
      const messageInput = document.getElementById("messageInput");
      const content = messageInput.value;

      if (content.trim()) {
        const messageDiv = document.createElement("div");
        messageDiv.className = "message";
        messageDiv.textContent = content;
        messagesDiv.appendChild(messageDiv);
        messageInput.value = ""; // 清空留言框
      }
    });
  </script>
